<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading | Conifer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Merriweather', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
        html.dark ::-webkit-scrollbar-thumb { background: #404040; }
        
        ::selection {
            background: rgba(0, 0, 0, 0.1);
        }
        html.dark ::selection {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
    <!-- PDF.js for text extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="bg-white text-black dark:bg-black dark:text-white font-sans antialiased h-screen flex flex-col transition-colors duration-300 overflow-hidden">

    <nav class="w-full px-6 py-4 flex justify-between items-center border-b border-black/10 dark:border-white/10 flex-shrink-0">
        <div class="flex items-center space-x-6">
            <a href="/index.html" class="text-sm font-medium hover:opacity-60 transition-opacity flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Library
            </a>
            <div class="h-4 w-px bg-black/20 dark:bg-white/20"></div>
            <span id="book-title-display" class="font-serif italic text-sm opacity-60">Loading book...</span>
        </div>
        
        <div class="hidden md:flex items-center space-x-2">
            <button id="prev-page" class="p-2 opacity-40 hover:opacity-100 disabled:pointer-events-none disabled:opacity-5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <span id="page-indicator" class="text-xs font-medium opacity-60 min-w-[80px] text-center">Page 0 / 0</span>
            <button id="next-page" class="p-2 opacity-40 hover:opacity-100 disabled:pointer-events-none disabled:opacity-5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div class="flex items-center space-x-4">
            <button id="nav-theme-btn" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex w-full overflow-hidden">
        
        <div class="w-full md:w-2/3 lg:w-3/4 h-full overflow-y-auto px-8 py-12 md:px-16 scroll-smooth" id="reader-container">
            <div class="max-w-2xl mx-auto">
                <div id="page-content" class="font-serif text-lg md:text-xl leading-relaxed space-y-6 opacity-90">
                    <div class="py-20 text-center opacity-50">Initializing reader...</div>
                </div>
            </div>
        </div>

        <div class="hidden md:flex w-1/3 lg:w-1/4 h-full border-l border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 flex-col flex-shrink-0">
            
            <div class="p-6 border-b border-black/10 dark:border-white/10 flex items-center">
                <img id="sidebar-logo" src="https://conifer.ink/img/coniferBlack.png" alt="Icon" class="h-5 w-auto mr-3 opacity-50">
                <span class="text-xs font-semibold uppercase tracking-widest opacity-50">Conifer AI</span>
            </div>

            <div id="ai-empty-state" class="flex-grow flex flex-col items-center justify-center p-8 text-center opacity-50">
                <svg class="w-8 h-8 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                <p class="text-sm font-medium">Highlight any text in the book to generate explanations, translations, or definitions.</p>
            </div>

            <div id="ai-active-state" class="hidden flex-grow flex-col p-6 overflow-y-auto">
                <div class="mb-6">
                    <p class="text-xs font-semibold uppercase tracking-widest opacity-50 mb-3">Selected Text</p>
                    <div class="border-l-2 border-black/20 dark:border-white/20 pl-4">
                        <p id="selected-text-display" class="text-sm italic opacity-80 leading-relaxed">...</p>
                    </div>
                </div>

                <div class="flex space-x-2 mb-8">
                    <button id="btn-explain" class="flex-1 bg-black text-white dark:bg-white dark:text-black py-2 rounded text-xs font-medium hover:opacity-80 transition-opacity">Explain</button>
                    <button id="btn-translate" class="flex-1 bg-transparent border border-black/20 dark:border-white/20 py-2 rounded text-xs font-medium hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Translate</button>
                </div>

                <div id="ai-response-container" class="hidden">
                    <p class="text-xs font-semibold uppercase tracking-widest opacity-50 mb-3">Analysis</p>
                    <div class="bg-white dark:bg-black p-5 rounded-lg border border-black/10 dark:border-white/10 shadow-sm">
                        <p id="ai-response-text" class="text-sm leading-relaxed opacity-90"></p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB01oxW2KmncUZeg0l-lP-e5kZXnXW28Ug",
            authDomain: "conifer-7cfdf.firebaseapp.com",
            projectId: "conifer-7cfdf",
            storageBucket: "conifer-7cfdf.firebasestorage.app",
            messagingSenderId: "1039452913173",
            appId: "1:1039452913173:web:df20012ad1dfb2a42b181c",
            measurementId: "G-KZCHEGCFQL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Global worker setup for PDF.js
        const functions = getFunctions(app);

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const explainText = httpsCallable(functions, 'explainText');

        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('book');
        let pdfDoc = null;
        let currentPageNum = 1;

        if (!bookId) {
            window.location.href = '/index.html';
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/index.html'; 
                return;
            }

            try {
                const bookRef = doc(db, "books", bookId);
                const bookSnap = await getDoc(bookRef);

                if (bookSnap.exists() && bookSnap.data().ownerId === user.uid) {
                    document.getElementById('book-title-display').textContent = bookSnap.data().title;
                    loadPdf(bookSnap.data().storagePath);
                } else {
                    alert("You do not have permission to read this book.");
                    window.location.href = '/index.html';
                }
            } catch (error) {
                console.error("Error fetching book:", error);
            }
        });

        async function loadPdf(storagePath) {
            try {
                const pdfUrl = await getDownloadURL(ref(storage, storagePath));
                
                // Using more robust loading parameters
                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
                    cMapPacked: true,
                });
                
                pdfDoc = await loadingTask.promise;
                displayPage(1);
            } catch (error) {
                console.error("PDF Loading Error:", error);
                document.getElementById('page-content').innerHTML = `<p class="text-red-500">Failed to load PDF file.</p>`;
            }
        }

        async function displayPage(pageNum) {
            if (!pdfDoc) return;
            currentPageNum = pageNum;
            
            document.getElementById('page-indicator').textContent = `Page ${pageNum} of ${pdfDoc.numPages}`;
            document.getElementById('prev-page').disabled = pageNum <= 1;
            document.getElementById('next-page').disabled = pageNum >= pdfDoc.numPages;

            const pageContentDiv = document.getElementById('page-content');
            pageContentDiv.innerHTML = `
                <div class="flex flex-col items-center py-20 opacity-40">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-black dark:border-white mb-4"></div>
                    <p class="text-sm">AI is cleaning page text...</p>
                </div>`;

            try {
                const page = await pdfDoc.getPage(pageNum);
                const textItem = await page.getTextContent();
                
                // Extract text with better handling of spaces
                let rawText = "";
                let lastY;
                for (let item of textItem.items) {
                    if (lastY !== undefined && lastY !== item.transform[5]) rawText += "\n";
                    rawText += item.str + " ";
                    lastY = item.transform[5];
                }

                const idToken = await auth.currentUser.getIdToken();
                const response = await fetch('https://us-central1-conifer-7cfdf.cloudfunctions.net/cleanPageText', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({ data: { text: rawText } })
                });

                const data = await response.json();
                if (response.ok) {
                    const cleaned = data.result || "";
                    pageContentDiv.innerHTML = cleaned.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
                    document.getElementById('reader-container').scrollTop = 0;
                } else {
                    pageContentDiv.innerHTML = `<p class="text-red-500">Error: ${data.error}</p>`;
                }
            } catch (error) {
                pageContentDiv.innerHTML = `<p class="text-red-500">Failed to process page.</p>`;
            }
        }

        const readerContainer = document.getElementById('reader-container');
        const aiEmptyState = document.getElementById('ai-empty-state');
        const aiActiveState = document.getElementById('ai-active-state');
        const selectedTextDisplay = document.getElementById('selected-text-display');
        const aiResponseContainer = document.getElementById('ai-response-container');
        const aiResponseText = document.getElementById('ai-response-text');

        let currentSelection = "";

        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            const text = selection.toString().trim();

            if (text.length > 0 && selection.anchorNode && readerContainer.contains(selection.anchorNode)) {
                currentSelection = text;
                aiEmptyState.classList.add('hidden');
                aiActiveState.classList.remove('hidden');
                aiActiveState.classList.add('flex');
                selectedTextDisplay.textContent = text.length > 150 ? text.substring(0, 150) + '...' : `"${text}"`;
                aiResponseContainer.classList.add('hidden');
            }
        });

       async function requestAIAnalysis(actionType) {
    if (!currentSelection) return;
    
    aiResponseContainer.classList.remove('hidden');
    aiResponseText.innerHTML = `<span class="animate-pulse opacity-60">Consulting AI...</span>`;

    try {
        const response = await fetch('https://us-central1-conifer-7cfdf.cloudfunctions.net/explainText', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { text: currentSelection, action: actionType } })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            aiResponseText.innerHTML = data.result || "AI returned empty response.";
        } else {
            // This will show the actual error (like API key issues) instead of undefined
            aiResponseText.innerHTML = `<span class="text-red-600">Error: ${data.error || "Unknown error"}</span>`;
        }
    } catch (error) {
        aiResponseText.innerHTML = `<span class="text-red-600">Network Error. Check console.</span>`;
    }
}

        document.getElementById('btn-explain').addEventListener('click', () => requestAIAnalysis('explain'));
        document.getElementById('btn-translate').addEventListener('click', () => requestAIAnalysis('translate'));

        document.getElementById('prev-page').addEventListener('click', () => currentPageNum > 1 && displayPage(currentPageNum - 1));
        document.getElementById('next-page').addEventListener('click', () => currentPageNum < pdfDoc.numPages && displayPage(currentPageNum + 1));

        document.getElementById('nav-theme-btn').addEventListener('click', () => {
            const htmlClasses = document.documentElement.classList;
            htmlClasses.toggle('dark');
            const isDark = htmlClasses.contains('dark');
            const sidebarLogo = document.getElementById('sidebar-logo');
            const themeIcon = document.getElementById('theme-icon');

            if (isDark) {
                if(sidebarLogo) sidebarLogo.src = 'https://conifer.ink/img/coniferWhite.png';
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            } else {
                if(sidebarLogo) sidebarLogo.src = 'https://conifer.ink/img/coniferBlack.png';
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            }
        });
    </script>
</body>
</html>
